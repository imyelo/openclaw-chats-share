<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- Amber accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#d4a853"/>

  <!-- Site title -->
  <text x="90" y="280" font-family="monospace" font-size="72" font-weight="500" fill="#e8e6e3">chats-share</text>

  <!-- Subtitle -->
  <text x="90" y="350" font-family="monospace" font-size="28" fill="#5c5958">the conversations bewteen me and my ai agent</text>
</svg>